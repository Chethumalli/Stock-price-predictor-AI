<!DOCTYPE html>
<html>

<head>

<title>AI Stock Analyst</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>🤖 AI Stock Analyst Dashboard</h1>

<input id="ticker" placeholder="Enter Stock Symbol (AAPL)">

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<canvas id="chart" width="600" height="300"></canvas>

</div>

<script>

let chart

async function analyze(){

const ticker = document.getElementById("ticker").value

const res = await fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ticker})
})

const data = await res.json()

document.getElementById("result").innerHTML = `
<h2>Current Price: $${data.current_price}</h2>
<h2>Predicted Price: $${data.prediction}</h2>
<h2>Signal: ${data.signal}</h2>
<p>${data.analysis.replace(/\n/g,"<br>")}</p>
`

const ctx = document.getElementById("chart").getContext("2d")

if(chart){
chart.destroy()
}

chart = new Chart(ctx,{
type:"line",
data:{
labels:data.dates,
datasets:[{
label:"Stock Price",
data:data.prices
}]
}
})

}

</script>

</body>

</html>
